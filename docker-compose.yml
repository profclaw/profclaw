# Profiles:
#   (default)   profclaw (pro mode) + redis
#   ai          + ollama (free local AI, optional)
#
# Quick start:
#   docker compose up -d                          # pro mode (default)
#   docker compose --profile ai up -d             # pro + ollama
#
# Copy .env.example to .env and fill in your keys before starting.

services:
  # ===================
  # profClaw Task Manager
  # ===================
  profclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: profclaw
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Core (override .env values for container-specific settings)
      - NODE_ENV=production
      - PORT=3000
      - PROFCLAW_MODE=pro
      # Redis (points to the redis service in this compose network)
      - REDIS_URL=redis://redis:6379
      # Database (stored in the data volume)
      - DATABASE_URL=file:/app/data/profclaw.db
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - profclaw-network

  # ===================
  # Redis (Task Queue - required for pro mode)
  # ===================
  redis:
    image: redis:7-alpine
    container_name: profclaw-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - profclaw-network

  # ===================
  # Ollama (Free Local AI - optional profile)
  # ===================
  ollama:
    image: ollama/ollama:latest
    container_name: profclaw-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    profiles:
      - ai
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - profclaw-network

volumes:
  redis-data:
    driver: local
  ollama-data:
    driver: local

networks:
  profclaw-network:
    driver: bridge
