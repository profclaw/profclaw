# Profiles:
#   (default)   profclaw (pro mode) + redis
#   pico        profclaw (pico mode) -- no redis, no UI
#   ai          + ollama (free local AI)
#   tools       + redis-commander
#   monitoring  + prometheus + grafana
#
# Quick start per mode:
#   docker compose up -d                                  # pro (default)
#   docker compose up -d profclaw-pico                    # pico only (minimal)
#   docker compose --profile ai up -d                     # pro + ollama
#
# NOTE: `docker compose --profile pico up -d` starts pico AND pro (port conflict).
#       Use `docker compose up -d profclaw-pico` for pico-only.

services:
  # ===================
  # profClaw Task Manager
  # ===================
  profclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: profclaw
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Core
      - NODE_ENV=production
      - PORT=3000
      - PROFCLAW_MODE=pro
      # Redis
      - REDIS_URL=redis://redis:6379
      - PROFCLAW_REQUIRE_REDIS=true
      # Database
      - DATABASE_URL=file:/app/data/profclaw.db
      # OpenClaw
      - OPENCLAW_BASE_URL=${OPENCLAW_BASE_URL:-http://host.docker.internal:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_WORKING_DIR=/workspace
      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_AI_TASK_LABEL=${GITHUB_AI_TASK_LABEL:-ai-task}
      # Task Queue
      - TASK_CONCURRENCY=${TASK_CONCURRENCY:-2}
      # AI Providers (optional)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - GROQ_API_KEY=${GROQ_API_KEY}
      # Ollama (free local AI)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      # Tool Execution
      - POOL_MAX_CONCURRENT=${POOL_MAX_CONCURRENT:-50}
      - POOL_TIMEOUT_MS=${POOL_TIMEOUT_MS:-300000}
    volumes:
      - profclaw-data:/app/data
      - workspace:/workspace
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - profclaw-network

  # ===================
  # profClaw Pico (minimal, no Redis)
  # ===================
  profclaw-pico:
    build:
      context: .
      dockerfile: Dockerfile.pico
    container_name: profclaw-pico
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PROFCLAW_MODE=pico
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - profclaw-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    profiles:
      - pico
    networks:
      - profclaw-network

  # ===================
  # Redis (Task Queue)
  # ===================
  redis:
    image: redis:7-alpine
    container_name: profclaw-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - profclaw-network

  # ===================
  # Ollama (Free Local AI)
  # ===================
  ollama:
    image: ollama/ollama:latest
    container_name: profclaw-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    profiles:
      - ai
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - profclaw-network

  # ===================
  # Redis Commander (Dev Tools)
  # ===================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: profclaw-redis-ui
    environment:
      - REDIS_HOSTS=profclaw:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - profclaw-network

  # ===================
  # Prometheus (Metrics)
  # ===================
  prometheus:
    image: prom/prometheus:latest
    container_name: profclaw-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    profiles:
      - monitoring
    networks:
      - profclaw-network

  # ===================
  # Grafana (Dashboards)
  # ===================
  grafana:
    image: grafana/grafana:latest
    container_name: profclaw-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring
    networks:
      - profclaw-network

volumes:
  profclaw-data:
    driver: local
  redis-data:
    driver: local
  workspace:
    driver: local
  ollama-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  profclaw-network:
    driver: bridge
