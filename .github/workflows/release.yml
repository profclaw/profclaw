name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write
  id-token: write

# Docker images are built and pushed locally via scripts/release-docker.sh
# This saves CI minutes and gives more control over the release process

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: google-github-actions/release-please-action@e4dc86ba9405554aeba3c6bb2d169500e7d3b4ee # v4.1.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  resolve-version:
    runs-on: ubuntu-latest
    needs: [release-please]
    if: always() && !cancelled() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'release')
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ needs.release-please.outputs.version }}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_OUTPUT
          fi

  npm-publish:
    needs: resolve-version
    if: always() && needs.resolve-version.result == 'success'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@11
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test -- --run

      - name: Publish to npm (OIDC trusted publishing)
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --access public --provenance

  # Docker images are built locally — see scripts/release-docker.sh
  # This avoids 8+ min CI builds and saves GitHub Actions minutes
  # To publish: ./scripts/release-docker.sh <version>
