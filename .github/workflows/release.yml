name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: google-github-actions/release-please-action@e4dc86ba9405554aeba3c6bb2d169500e7d3b4ee # v4.1.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  resolve-version:
    runs-on: ubuntu-latest
    needs: [release-please]
    if: always() && !cancelled() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'release')
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ needs.release-please.outputs.version }}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_OUTPUT
          fi

  npm-publish:
    needs: resolve-version
    if: always() && needs.resolve-version.result == 'success'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@11
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test -- --run

      - name: Publish to npm (OIDC trusted publishing)
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --access public --provenance

  # Build each arch in parallel, then merge into multi-arch manifest
  docker-build:
    needs: resolve-version
    if: always() && needs.resolve-version.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (main)
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.13.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ matrix.suffix }}
          cache-from: type=gha,scope=main-${{ matrix.suffix }}
          cache-to: type=gha,scope=main-${{ matrix.suffix }},mode=max

      - name: Build and push (pico)
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.13.0
        with:
          context: .
          file: Dockerfile.pico
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pico-build-${{ matrix.suffix }}
          cache-from: type=gha,scope=pico-${{ matrix.suffix }}
          cache-to: type=gha,scope=pico-${{ matrix.suffix }},mode=max

  docker-manifest:
    needs: [resolve-version, docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests (main)
        run: |
          IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VER=${{ needs.resolve-version.outputs.version }}
          TAG=${{ needs.resolve-version.outputs.tag_name }}
          for T in latest "$VER" "$TAG"; do
            docker buildx imagetools create -t "$IMG:$T" "$IMG:build-amd64" "$IMG:build-arm64"
          done

      - name: Create multi-arch manifests (pico)
        run: |
          IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VER=${{ needs.resolve-version.outputs.version }}
          docker buildx imagetools create -t "$IMG:pico" "$IMG:pico-build-amd64" "$IMG:pico-build-arm64"
          docker buildx imagetools create -t "$IMG:$VER-pico" "$IMG:pico-build-amd64" "$IMG:pico-build-arm64"
